server {
    listen 7474;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── RSS PROXY ─────────────────────────────────────────────────────────────
    # Forwards to the Node proxy service which handles URL decoding correctly.
    # nginx cannot decode %3A%2F%2F in $arg_url for proxy_pass, so we delegate
    # to a Node service that uses URLSearchParams (which auto-decodes).
    location /proxy {
        limit_except GET OPTIONS { deny all; }

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin'  '*';
            add_header 'Access-Control-Allow-Methods' 'GET';
            return 204;
        }

        proxy_pass         http://proxy:7475;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 20s;
    }

    # ── APP SHELL ─────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Immutable cache for versioned static assets
    location ~* \.(js|css|png|svg|woff|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache HTML — always check for updates
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Never cache service worker
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Gzip
    gzip on;
    gzip_types application/javascript text/css application/json application/xml text/xml;
    gzip_min_length 1024;
}
