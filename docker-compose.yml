services:
  proxy:
    build:
      context: .
      dockerfile: docker/Dockerfile.proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7475/proxy?url=https://feeds.bbci.co.uk/news/world/rss.xml"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "7474:7474"
    depends_on:
      - proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474/"]
      interval: 30s
      timeout: 5s
      retries: 3
